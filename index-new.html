            width: 100%;

            border-color: #667eea;
        }

            background: #f5f5f7;
            padding: 16px;
            border-radius: 12px;
            margin-top: 16px;
        }

        .result-item {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid #e5e5e7;
        }

        .result-item:last-child {
            border-bottom: none;
        }

        .result-label {
            color: #86868b;
            font-size: 14px;
        }

        .result-value {
            font-weight: 600;
            font-size: 16px;
            color: #1d1d1f;

        .result-value.highlight {

        .list-item {
            padding: 16px;

            font-size: 14px;
            color: #86868b;
            margin-bottom: 8px;

            display: flex;
            gap: 16px;

            align-items: center;
            gap: 4px;

        .stat-value {
            font-weight: 600;
            font-size: 14px;

            color: #34c759;

        .stat-value.negative {
            color: #ff3b30;
        }

        .stat-label {
            font-size: 12px;
            color: #86868b;
        }

        .temperature-meter {
            height: 8px;
            background: linear-gradient(90deg, #34c759 0%, #ff9500 50%, #ff3b30 100%);
            border-radius: 4px;
            margin: 16px 0;
            position: relative;
        }

        .temperature-indicator {
            position: absolute;
            width: 20px;
            height: 20px;
            background: white;
            border: 3px solid #667eea;
            border-radius: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            cursor: pointer;
            transition: left 0.3s ease;
        }

        .temperature-labels {
            display: flex;
            justify-content: space-between;
            font-size: 12px .progress-bar {
            height: 4px;
            background: #e5e5e7;
            border-radius: 2px;
            overflow: hidden;
            margin-top: 8px;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            border-radius: 2px;
            transition: width 0.5s ease;
        }

            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
